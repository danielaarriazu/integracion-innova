openapi: 3.0.0
info:
  title: API de Autenticación y Base de Conocimientos - InnovaLab Chatbot
  description: >
    Especificación de los endpoints de registro y login. 
    Arquitectura con inicialización de Bot integrada y registro de última sesión, histórico
    de movimientos y autenticación de alta seguridad.
    ABM de FAQs con categorías.
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  # ==========================================
  # MÓDULO: AUTENTICACIÓN
  # ==========================================
  /api/auth/register:
    post:
      summary: Registro de un nuevo Emprendedor
      description: >
        Registra un usuario con el rol (EMPRENDEDOR), ejecuta validaciones estrictas de formato antes de crear su fila en ConfiguracionBot mediante una transacción ACID.
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - email
                - password
              properties:
                nombre:
                  type: string
                  minLength: 1
                  example: "Daniela Innova"
                  description: Nombre completo del emprendedor. No puede estar vacío ni contener solo espacios.
                email:
                  type: string
                  format: email
                  pattern: '^[^\s@]+@[^\s@]+\.[^\s@]+$'
                  example: "daniela@innovalab.com"
                  description: Correo electrónico único y con formato válido.
                password:
                  type: string
                  format: password
                  minLength: 8
                  pattern: '^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&.\-_#])[A-Za-z\d@$!%*?&.\-_#]{8,}$'
                  example: "PasswordSegura2026!"
                  description: >
                    Contraseña de acceso. Requisitos obligatorios: Mínimo 8 caracteres de longitud, 
                    debe contener al menos una letra, al menos un número y al menos un carácter especial 
                    permitido (@, $, !, %, *, ?, &, ., -, _, #).
      responses:
        '201':
          description: Usuario y Configuración de Bot creados con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Emprendedor registrado con éxito junto a su configuración de bot"
                  usuarioId:
                    type: string
                    format: uuid
                    example: "4fbc752d-9321-4f11-8e99-fa20d2d88851"
        '400':
          description: Error de validación en los datos enviados o email duplicado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    oneOf:
                      - example: "El nombre es obligatorio y no puede estar vacío"
                      - example: "El formato del correo electrónico no es válido"
                      - example: "La contraseña debe tener al menos 8 caracteres, e incluir letras, números y al menos un carácter especial..."
                      - example: "El email ya está registrado"
        '500':
          description: Error interno.

  /api/auth/login:
    post:
      summary: Inicio de sesión de Emprendedor
      description: Validar credenciales, genera el log en HistorialSesion, guarda última sesión y genera JWT por 24 horas.
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "daniela@innovalab.com"
                  description: Correo electrónico registrado.
                password:
                  type: string
                  format: password
                  example: "PasswordSegura2026!"
                  description: Contraseña de acceso.
      responses:
        '200':
          description: Credenciales válidas. Devuelve token válido por 24h.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  usuario:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "4fbc752d-9321-4f11-8e99-fa20d2d88851"
                      nombre:
                        type: string
                        example: "Daniela Innova"
                      email:
                        type: string
                        example: "daniela@innovalab.com"
        '401':
          description: Credenciales incorrectas o cuenta inactiva.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    oneOf:
                      - example: "Credenciales inválidas"
                      - example: "La cuenta se encuentra inactiva o dada de baja"
        '500':
          description: Error interno del servidor.

  # ==========================================
  # MÓDULO: USUARIO (Requieren Token)
  # ==========================================
  /api/user/change-password:
    post:
      summary: Cambiar contraseña
      description: >
        Permite al emprendedor cambiar su contraseña actual por una nueva. 
        Aplica validaciones estrictas y registra el movimiento en la tabla RegistroActividad.
      tags:
        - Usuario
      security:
        - bearerAuth: [] 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - passwordActual
                - nuevaPassword
              properties:
                passwordActual:
                  type: string
                  example: "PasswordSegura2026!"
                  description: Contraseña de acceso actual.
                nuevaPassword:
                  type: string
                  example: "InnovaLabNueva26@#"
                  description: Nueva contraseña.
      responses:
        '200':
          description: Contraseña actualizada con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Contraseña actualizada con éxito."
        '400':
          description: Error de validación o contraseña actual incorrecta.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    oneOf:
                      - example: "La contraseña actual es incorrecta"
                      - example: "La nueva contraseña debe tener mínimo 8 caracteres, una mayúscula..."
        '401':
          description: Token faltante o expirado.
        '404':
          description: Usuario no encontrado.
        '500':
          description: Error interno del servidor.

  /api/user/delete-account:
    delete:
      summary: Dar de baja la cuenta (Soft Delete)
      description: >
        Ejecuta un falso eliminar. Cambia el estado del usuario a ELIMINADO para restringir su acceso, 
        pero conserva su historial y métricas. Registra la acción en RegistroActividad.
      tags:
        - Usuario
      security:
        - bearerAuth: [] 
      responses:
        '200':
          description: Cuenta dada de baja con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Cuenta deshabilitada correctamente. Se conservan datos para métricas."
        '401':
          description: Acceso denegado. Token faltante, expirado o inválido.
        '500':
          description: Error interno al procesar la baja.

  # ==========================================
  # MÓDULO: CATEGORÍAS FAQ
  # ==========================================
  /api/faq-categories:
    get:
      summary: Listar categorías de FAQs
      description: Obtiene todas las categorías asociadas al bot del emprendedor logueado.
      tags:
        - Categorías FAQ
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Devuelve un array con todas las categorías del bot.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                      example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                    bot_id:
                      type: string
                      format: uuid
                      example: "09876543-abcd-efgh-ijkl-mnopqrstuvwx"
                    nombre:
                      type: string
                      example: "Medios de Pago"
                    fecha_creacion:
                      type: string
                      format: date-time
                      example: "2026-06-15T15:30:00Z"
        '401':
          description: No autorizado. Token inválido.
        '404':
          description: Configuración de bot no encontrada para el usuario.
        '500':
          description: Error interno al obtener las categorías.
    post:
      summary: Crear categoría
      description: Crea una nueva categoría de FAQs para el bot del emprendedor logueado.
      tags:
        - Categorías FAQ
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
              properties:
                nombre:
                  type: string
                  minLength: 1
                  example: "Envíos y Retiros"
                  description: Nombre visible de la categoría. No puede estar vacío ni contener solo espacios.
      responses:
        '201':
          description: Categoría creada con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoría creada con éxito."
                  categoria:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                      nombre:
                        type: string
                        example: "Envíos y Retiros"
        '400':
          description: El nombre de la categoría está vacío.
        '404':
          description: Configuración de bot no encontrada para el usuario.
        '500':
          description: Error interno al crear la categoría.

  /api/faq-categories/{id}:
    put:
      summary: Editar categoría
      description: Actualiza los detalles de una categoría de FAQs existente.
      tags:
        - Categorías FAQ
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
              properties:
                nombre:
                  type: string
                  example: "Logística y Envíos"
      responses:
        '200':
          description: Categoría actualizada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoría actualizada con éxito."
                  categoria:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                      nombre:
                        type: string
                        example: "Envíos y Retiros"
        '400':
          description: El nombre de la categoría está vacío.
        '404':
          description: Categoría no encontrada o no autorizada.
        '500':
          description: Error interno al actualizar la categoría.
    delete:
      summary: Eliminar categoría
      description: Elimina la categoría de forma permanente. Requiere que no existan FAQs asociadas (regla de restricción).
      tags:
        - Categorías FAQ
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
      responses:
        '200':
          description: Categoría eliminada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoría eliminada con éxito."
        '400':
          description: Restricción de base de datos activa.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "No podés eliminar esta categoría porque tiene 3 pregunta(s) asociada(s). Eliminá o mové las preguntas primero."
        '404':
          description: Categoría no encontrada.
        '500':
          description: Error interno al eliminar la categoría.

  # ==========================================
  # MÓDULO: PREGUNTAS FRECUENTES (FAQ)
  # ==========================================
  /api/faqs:
    get:
      summary: Listar FAQs
      description: Obtiene todas las preguntas frecuentes del bot, incluyendo el nombre de la categoría a la que pertenecen.
      tags:
        - FAQs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array de FAQs devuelto con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                      example: "b1c2d3e4-f5g6-7890-hij1-klmnopqrstuv"
                    categoria_id:
                      type: string
                      format: uuid
                      example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                    pregunta:
                      type: string
                      example: "¿Hacen envíos a todo el país?"
                    respuesta:
                      type: string
                      example: "Sí, realizamos envíos a través de Correo Argentino."
                    keywords:
                      type: string
                      example: "envíos, correo, logística, interior, país"
                    categoria:
                      type: object
                      properties:
                        nombre:
                          type: string
                          example: "Envíos y Retiros"
        '400':
          description: Error al obtener las FAQs.
        '401':
          description: No autorizado. Token inválido.
        '404':
          description: No encontrado. Configuración de bot no hallada para este usuario.
        '500': 
          description: Error interno al obtener las FAQs.
    post:
      summary: Crear una nueva FAQ
      description: Asocia una nueva pregunta y respuesta a una categoría existente.
      tags:
        - FAQs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoria_id
                - pregunta
                - respuesta
              properties:
                categoria_id:
                  type: string
                  format: uuid
                  example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                  description: ID de la categoría a la que pertenece.
                pregunta:
                  type: string
                  example: "¿Aceptan transferencias bancarias?"
                respuesta:
                  type: string
                  example: "Sí, aceptamos transferencias. Te enviaremos el CBU al confirmar el pedido."
                keywords:
                  type: string
                  example: "transferencia, banco, cbu, alias, pagar"
                  description: Palabras clave separadas por comas para mejorar la coincidencia del bot.
      responses:
        '201':
          description: Pregunta frecuente creada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Pregunta frecuente creada con éxito."
                  faq:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "c3d4e5f6-g7h8-9012-ijkl-mnopqrstuvwx"
                      pregunta:
                        type: string
                        example: "¿Aceptan transferencias bancarias?"
        '400':
          description: Faltan campos obligatorios en el body.
        '404':
          description: La categoría no existe o no pertenece al bot del usuario.
        '500':
          description: Error interno al crear la FAQ. 

  /api/faqs/{id}:
    put:
      summary: Editar FAQ
      description: Modifica los datos de una pregunta frecuente específica.
      tags:
        - FAQs
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "b1c2d3e4-f5g6-7890-hij1-klmnopqrstuv"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoria_id:
                  type: string
                  format: uuid
                  example: "1a2b3c4d-5678-90ef-ghij-klmnopqrstuv"
                pregunta:
                  type: string
                  example: "¿Tienen cuotas sin interés?"
                respuesta:
                  type: string
                  example: "Ofrecemos 3 cuotas sin interés con tarjetas de crédito bancarias."
                keywords:
                  type: string
                  example: "cuotas, interés, crédito, tarjeta"
      responses:
        '200':
          description: FAQ actualizada con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Pregunta actualizada con éxito."
                  faq:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "b1c2d3e4-f5g6-7890-hij1-klmnopqrstuv"
                      pregunta:
                        type: string
                        example: "¿Tienen cuotas sin interés?"
        '400':
          description: La nueva categoría es inválida.
        '404':
          description: Pregunta no encontrada o no autorizada.
        '500':
          description: Error interno al actualizar la FAQ.
    delete:
      summary: Eliminar FAQ
      description: Elimina permanentemente la pregunta frecuente de la base de conocimientos.
      tags:
        - FAQs
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          example: "b1c2d3e4-f5g6-7890-hij1-klmnopqrstuv"
      responses:
        '200':
          description: FAQ eliminada correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Pregunta eliminada con éxito."
        '404':
          description: Pregunta no encontrada.
        '500':
          description: Error interno al eliminar la FAQ.