openapi: 3.0.0
info:
title: API de Autenticación, Configuración de Bot y Log de registros - InnovaLab Chatbot
  description: >
    Especificación completa de los endpoints del backend de InnovaLab.
    
    El sistema cuenta con una arquitectura de múltiples módulos:
    - Autenticación y Seguridad: Registro, login, historial de sesiones y gestión de cuenta.
    - Configuración del Bot: Permite al emprendedor personalizar la experiencia de su asistente virtual, gestionar categorías, preguntas frecuentes (FAQs) y cargar su catálogo de productos.
    - Analítica y Telemetría: Pipeline de datos de alta concurrencia que registra el comportamiento de los usuarios (clics, navegación, errores) a lo largo del embudo de conversión, unificando el tráfico de visitantes anónimos con usuarios autenticados.
    
    Documentación detallada de cada endpoint, incluyendo validaciones estrictas, manejo de Rate Limiting, respuestas esperadas y códigos de error.
  version: 1.1.0
servers:
  - url: http://localhost:3000
    description: Entorno de desarrollo local
  - url: https://chatbot-innova-backend-6388.onrender.com
    description: Producción (Render)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Token JWT obtenido desde POST /api/auth/login"
  schemas:
    # ─── RESPUESTAS GENÉRICAS ───────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
 
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
 
    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Los datos enviados no son válidos"
        detalles:
          type: array
          items:
            type: object
            properties:
              campo:
                type: string
                example: "email"
              mensaje:
                type: string
                example: "El formato del correo electrónico no es válido"
 
    # ─── ENTIDADES ──────────────────────────────────────────────────────────
    ConfiguracionBot:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "c8d1e2f3-4567-89ab-cdef-012345678901"
        usuarioId:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        activo:
          type: boolean
          example: true
        nombreNegocio:
          type: string
          example: "La Tienda de Marta"
        rubroId:
          type: string
          format: uuid
          nullable: true
        descripcionBreve:
          type: string
          nullable: true
          example: "Venta de ropa femenina online y a domicilio"
        horarioAtencion:
          type: string
          nullable: true
          example: "Lunes a Viernes de 9 a 18hs"
        telefono:
          type: string
          nullable: true
          example: "+54 11 1234-5678"
        logoUrl:
          type: string
          nullable: true
          example: "https://res.cloudinary.com/micloud/image/upload/v1234/emprendebot_logos/logo-1719000000000.webp"
        mensajeBienvenida:
          type: string
          nullable: true
          example: "¡Hola! Bienvenido/a a La Tienda de Marta. ¿En qué te puedo ayudar hoy?"
        mensajeFueraHorario:
          type: string
          nullable: true
          example: "Por el momento estamos fuera de horario. Dejanos tu consulta y te respondemos a la brevedad."
        respuestaDerivacion:
          type: string
          nullable: true
          example: "Aguarda un momento, te comunico con un asesor."
        derivacionAutomatica:
          type: boolean
          example: false
        fechaCreacion:
          type: string
          format: date-time
        fechaActualizacion:
          type: string
          format: date-time
 
    CategoriaFAQ:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
        botId:
          type: string
          format: uuid
        nombre:
          type: string
          example: "Envíos y entregas"
        fechaCreacion:
          type: string
          format: date-time
 
    FAQ:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "d4e5f6a7-b8c9-0123-abcd-456789012345"
        botId:
          type: string
          format: uuid
        categoriaId:
          type: string
          format: uuid
        pregunta:
          type: string
          example: "¿Realizan envíos al interior del país?"
        respuesta:
          type: string
          example: "Sí, enviamos a todo el país mediante OCA y Andreani. El costo varía según la zona."
        activa:
          type: boolean
          example: true
        fechaCreacion:
          type: string
          format: date-time
        fechaModificacion:
          type: string
          format: date-time
        categoria:
          $ref: '#/components/schemas/CategoriaFAQ'
 
    Producto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "e5f6a7b8-c9d0-1234-abcd-567890123456"
        botId:
          type: string
          format: uuid
        nombre:
          type: string
          example: "Remera básica manga corta"
        descripcion:
          type: string
          nullable: true
          example: "100% algodón, disponible en talles S, M, L y XL"
        precio:
          type: number
          example: 8500.00
        stock:
          type: integer
          example: 45
        urlImagen:
          type: string
          nullable: true
          example: "https://res.cloudinary.com/micloud/image/upload/v1234/emprendebot_productos/prod-1719000000000.jpg"
        activo:
          type: boolean
          example: true
        fechaCreacion:
          type: string
          format: date-time
        fechaActualizacion:
          type: string
          format: date-time
 
    Rubro:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
          example: "Indumentaria"
 
    PaginatedFAQs:
      type: object
      properties:
        faqs:
          type: array
          items:
            $ref: '#/components/schemas/FAQ'
        total:
          type: integer
          example: 12
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalPaginas:
          type: integer
          example: 2
 
    PaginatedProductos:
      type: object
      properties:
        productos:
          type: array
          items:
            $ref: '#/components/schemas/Producto'
        total:
          type: integer
          example: 8
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalPaginas:
          type: integer
          example: 1
 
tags:
  - name: Sistema
    description: Health check y estado del servidor
  - name: Autenticación
    description: Registro e inicio de sesión
  - name: Cuenta
    description: Gestión de la cuenta del usuario (contraseña, eliminación)
  - name: Bot
    description: Configuración del asistente virtual y rubros de negocio
  - name: Categorías FAQ
    description: Gestión de categorías de preguntas frecuentes
  - name: FAQs
    description: Gestión de preguntas y respuestas del chatbot
  - name: Productos
    description: Catálogo de productos del negocio
  - name: Telemetría
    description: Registro de eventos de comportamiento del usuario

paths:
   # ==========================================================================
  # SISTEMA
  # ==========================================================================
  /health:
    get:
      tags: [Sistema]
      summary: Health check del servidor y la base de datos
      description: |
        Verifica que el servidor esté corriendo y que la conexión con PostgreSQL funcione.
        No requiere autenticación. No está sujeto al rate limiter global.
      responses:
        '200':
          description: Servidor y base de datos operativos
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
                  db:
                    type: string
                    example: "connected"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-07-02T15:30:00.000Z"
        '503':
          description: La base de datos no responde
          content:
            application/json:
              example:
                status: "ERROR"
                db: "disconnected"
                timestamp: "2026-07-02T15:30:00.000Z"
 
  # ==========================================================================
  # AUTENTICACIÓN
  # ==========================================================================
  /api/auth/register:
    post:
      tags: [Autenticación]
      summary: Registrar un nuevo emprendedor
      description: |
        Crea un usuario con rol `EMPRENDEDOR`.
 
        **Lo que hace internamente (transacción ACID):**
        1. Verifica que el email no esté registrado
        2. Hashea la contraseña con bcryptjs (costo 10)
        3. Crea el `Usuario`
        4. Crea la `ConfiguracionBot` (1:1 con el usuario)
        5. Crea 5 categorías de FAQ con preguntas de ejemplo
 
        Si cualquier paso falla, toda la operación se revierte.
 
        **Rate limit:** 10 requests cada 15 minutos por IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, email, password]
              properties:
                nombre:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Nombre completo del emprendedor
                  example: "Marta González"
                email:
                  type: string
                  format: email
                  description: Email único. Se convierte a minúsculas automáticamente.
                  example: "marta@tiendamarta.com"
                password:
                  type: string
                  format: password
                  description: |
                    Requisitos: mínimo 8 caracteres, al menos 1 mayúscula, 1 minúscula,
                    1 número y 1 símbolo (@, $, !, %, *, ?, & u otros).
                    No puede contener espacios.
                  example: "MiTienda2026!"
                nombreNegocio:
                  type: string
                  maxLength: 150
                  description: Nombre del negocio (opcional, se usa para el mensaje de bienvenida del bot)
                  example: "La Tienda de Marta"
            examples:
              completo:
                summary: Registro con nombre de negocio
                value:
                  nombre: "Marta González"
                  email: "marta@tiendamarta.com"
                  password: "MiTienda2026!"
                  nombreNegocio: "La Tienda de Marta"
              minimo:
                summary: Registro mínimo (sin nombre de negocio)
                value:
                  nombre: "Carlos Pérez"
                  email: "carlos@ejemplo.com"
                  password: "CarlosSeguro99@"
      responses:
        '201':
          description: Usuario registrado y bot inicializado con éxito
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Usuario registrado exitosamente con configuración de bot inicializada"
                  usuarioId:
                    type: string
                    format: uuid
                    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              examples:
                password_debil:
                  summary: Contraseña no cumple requisitos
                  value:
                    success: false
                    error: "Los datos enviados no son válidos"
                    detalles:
                      - campo: "password"
                        mensaje: "Debe contener al menos un símbolo (@, $, !, %, *, ?, &, etc.)"
                email_invalido:
                  summary: Email con formato incorrecto
                  value:
                    success: false
                    error: "Los datos enviados no son válidos"
                    detalles:
                      - campo: "email"
                        mensaje: "El formato del correo electrónico no es válido"
        '409':
          description: El email ya está registrado
          content:
            application/json:
              example:
                success: false
                error: "El email ya está registrado en el sistema"
        '429':
          description: Rate limit excedido (10 intentos por 15 minutos por IP)
          content:
            application/json:
              example:
                error: "Demasiados intentos. Esperá 15 minutos antes de volver a intentar."
 
  /api/auth/login:
    post:
      tags: [Autenticación]
      summary: Iniciar sesión
      description: |
        Autentica al usuario y devuelve un token JWT válido por 24 horas.
 
        **Lo que hace internamente:**
        1. Busca el usuario por email
        2. Verifica que la cuenta esté `ACTIVO`
        3. Compara el password con el hash (bcryptjs)
        4. Genera un JWT con `{ id, email, rol }`
        5. Registra la sesión en `HistorialSesion` y actualiza `ultimaSesion`
 
        **Rate limit:** 10 requests cada 15 minutos por IP.
 
        **Uso del token:** Enviarlo en el header `Authorization: Bearer <token>` en todos los endpoints que requieren autenticación.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "marta@tiendamarta.com"
                password:
                  type: string
                  format: password
                  example: "MiTienda2026!"
            example:
              email: "marta@tiendamarta.com"
              password: "MiTienda2026!"
      responses:
        '200':
          description: Login exitoso. Guardar el `token` para usarlo en requests posteriores.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Login exitoso"
                  token:
                    type: string
                    description: JWT para usar en el header Authorization. Válido 24 horas.
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImExYjJjM2Q0LWU1ZjYtNzg5MC1hYmNkLWVmMTIzNDU2Nzg5MCIsImVtYWlsIjoibWFydGFAdGllbmRhbWFydGEuY29tIiwicm9sIjoiRU1QUkVOREVET1IiLCJpYXQiOjE3NTExNDU2MDAsImV4cCI6MTc1MTIzMjAwMH0.firma_aqui"
                  usuario:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      nombre:
                        type: string
                        example: "Marta González"
                      email:
                        type: string
                        example: "marta@tiendamarta.com"
                      rol:
                        type: string
                        example: "EMPRENDEDOR"
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              example:
                error: "Credenciales inválidas"
        '403':
          description: Cuenta suspendida o eliminada
          content:
            application/json:
              example:
                error: "Esta cuenta se encuentra suspendida o eliminada"
        '429':
          description: Rate limit de autenticación excedido
          content:
            application/json:
              example:
                error: "Demasiados intentos. Esperá 15 minutos antes de volver a intentar."
 
  # ==========================================================================
  # CUENTA DE USUARIO
  # ==========================================================================
  /api/user/change-password:
    post:
      tags: [Cuenta]
      summary: Cambiar contraseña
      description: |
        Cambia la contraseña del usuario autenticado.
 
        **Reglas:**
        - Se debe proveer la contraseña actual (verificación de identidad)
        - La nueva contraseña debe cumplir los mismos requisitos que al registrarse
        - La nueva contraseña no puede ser igual a la actual
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [passwordActual, nuevaPassword]
              properties:
                passwordActual:
                  type: string
                  format: password
                  example: "MiTienda2026!"
                nuevaPassword:
                  type: string
                  format: password
                  description: |
                    Requisitos: mínimo 8 caracteres, mayúscula, minúscula, número, símbolo.
                    No puede ser igual a la contraseña actual.
                  example: "NuevaClave2027@"
            example:
              passwordActual: "MiTienda2026!"
              nuevaPassword: "NuevaClave2027@"
      responses:
        '200':
          description: Contraseña actualizada
          content:
            application/json:
              example:
                success: true
                message: "Contraseña actualizada con éxito"
        '400':
          description: La contraseña actual es incorrecta o la nueva no cumple requisitos
          content:
            application/json:
              examples:
                password_incorrecta:
                  value:
                    error: "La contraseña actual es incorrecta"
                misma_password:
                  value:
                    success: false
                    error: "Los datos enviados no son válidos"
                    detalles:
                      - campo: "nuevaPassword"
                        mensaje: "La nueva contraseña no puede ser igual a la actual"
        '401':
          description: Token inválido o expirado
 
  /api/user/delete-account:
    delete:
      tags: [Cuenta]
      summary: Eliminar cuenta (soft delete)
      description: |
        Marca la cuenta del usuario como `ELIMINADO`. No elimina físicamente la fila de la base de datos.
 
        **Efecto:**
        - El usuario no puede volver a iniciar sesión
        - Los tokens existentes se invalidan en el próximo request (el middleware `verificarToken` verifica el estado en DB)
        - El historial de actividad y las sesiones se conservan en la base de datos
 
        **Requiere confirmar la contraseña** como verificación de identidad antes de proceder.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  format: password
                  description: Contraseña actual del usuario como confirmación
                  example: "MiTienda2026!"
            example:
              password: "MiTienda2026!"
      responses:
        '200':
          description: Cuenta eliminada
          content:
            application/json:
              example:
                success: true
                message: "Cuenta eliminada exitosamente"
        '401':
          description: Contraseña incorrecta o token inválido
          content:
            application/json:
              example:
                success: false
                error: "Contraseña incorrecta"
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              example:
                success: false
                error: "Usuario no encontrado"
 
  # ==========================================================================
  # CONFIGURACIÓN DEL BOT
  # ==========================================================================
  /api/bot:
    get:
      tags: [Bot]
      summary: Obtener configuración del bot
      description: |
        Devuelve la configuración completa del bot del usuario autenticado.
        Cada usuario tiene exactamente un bot (relación 1:1 creada al registrarse).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Configuración del bot
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  configuracion:
                    $ref: '#/components/schemas/ConfiguracionBot'
        '401':
          description: No autenticado
        '403':
          description: Sin permisos (rol incorrecto)
        '404':
          description: Bot no encontrado (no debería ocurrir en condiciones normales)
 
    put:
      tags: [Bot]
      summary: Actualizar configuración del bot (JSON)
      description: |
        Actualiza uno o más campos de la configuración del bot.
        Todos los campos son opcionales — solo se actualizan los que se envían.
 
        **Para actualizar el logo**, usar `PATCH /api/bot/config` con `multipart/form-data`.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                activo:
                  type: boolean
                  example: true
                nombreNegocio:
                  type: string
                  maxLength: 150
                  example: "La Tienda de Marta — Indumentaria"
                rubroId:
                  type: string
                  format: uuid
                  description: ID de un rubro obtenido desde GET /api/bot/rubros
                  example: "b2c3d4e5-f6a7-8901-bcde-f01234567890"
                descripcionBreve:
                  type: string
                  maxLength: 500
                  example: "Venta de indumentaria femenina. Envíos a todo el país."
                horarioAtencion:
                  type: string
                  maxLength: 100
                  example: "Lunes a Viernes de 9 a 18hs. Sábados de 10 a 14hs."
                telefono:
                  type: string
                  maxLength: 50
                  example: "+54 11 1234-5678"
                logoUrl:
                  type: string
                  format: uri
                  description: URL directa a una imagen (alternativa a subir archivo)
                  example: "https://ejemplo.com/mi-logo.png"
                mensajeBienvenida:
                  type: string
                  maxLength: 500
                  example: "¡Hola! Bienvenido/a a La Tienda de Marta. ¿En qué te puedo ayudar hoy? 😊"
                mensajeFueraHorario:
                  type: string
                  maxLength: 500
                  example: "Por el momento estamos fuera de horario. Respondemos de Lun a Vie de 9 a 18hs."
                respuestaDerivacion:
                  type: string
                  maxLength: 500
                  example: "Te comunico con un asesor, aguardá un momento."
                derivacionAutomatica:
                  type: boolean
                  example: false
            examples:
              activar_bot:
                summary: Activar el bot y configurar nombre
                value:
                  activo: true
                  nombreNegocio: "La Tienda de Marta"
                  mensajeBienvenida: "¡Hola! Soy Marti, el asistente de La Tienda de Marta. ¿Cómo te puedo ayudar?"
              actualizar_horario:
                summary: Solo actualizar horario de atención
                value:
                  horarioAtencion: "Lunes a Viernes de 10 a 17hs (no atendemos feriados)"
              configuracion_completa:
                summary: Configuración completa del negocio
                value:
                  activo: true
                  nombreNegocio: "La Tienda de Marta"
                  descripcionBreve: "Venta de ropa femenina online. Envíos en 24-48hs."
                  horarioAtencion: "Lunes a Viernes de 9 a 18hs"
                  telefono: "+54 9 11 1234-5678"
                  mensajeBienvenida: "¡Bienvenida a La Tienda de Marta! ¿En qué te ayudo?"
                  mensajeFueraHorario: "Estamos fuera de horario, te respondemos pronto."
                  respuestaDerivacion: "Te paso con una asesora, ¡ya te atienden!"
                  derivacionAutomatica: false
      responses:
        '200':
          description: Configuración actualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Configuración del bot actualizada con éxito."
                  configuracion:
                    $ref: '#/components/schemas/ConfiguracionBot'
        '400':
          description: Validación fallida
        '401':
          description: No autenticado
        '404':
          description: Bot no encontrado
 
  /api/bot/config:
    patch:
      tags: [Bot]
      summary: Actualizar logo del bot (multipart/form-data)
      description: |
        Sube una imagen de logo para el bot mediante `multipart/form-data`.
 
        La imagen se sube a Cloudinary y la URL pública resultante se guarda en `ConfiguracionBot.logoUrl`.
 
        **Campo del form:** `imagenLogo`
 
        **Formatos aceptados:** JPG, JPEG, PNG, WEBP
 
        **Tamaño máximo:** 5MB
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                imagenLogo:
                  type: string
                  format: binary
                  description: Archivo de imagen del logo
      responses:
        '200':
          description: Logo actualizado. La respuesta incluye la URL de Cloudinary.
          content:
            application/json:
              example:
                success: true
                data:
                  id: "c8d1e2f3-4567-89ab-cdef-012345678901"
                  logoUrl: "https://res.cloudinary.com/micloud/image/upload/v1234/emprendebot_logos/logo-1719000000000.webp"
        '401':
          description: No autenticado
 
  /api/bot/rubros:
