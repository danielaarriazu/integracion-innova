  # ==========================================================================
  # CATEGORÍAS DE FAQ
  # ==========================================================================
  /api/faq-categories:
    post:
      tags: [Categorías FAQ]
      summary: Crear categoría de FAQ
      description: |
        Crea una nueva categoría de preguntas frecuentes para el bot del usuario autenticado.
 
        Las categorías se crean automáticamente al registrarse. Este endpoint permite crear categorías adicionales.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre]
              properties:
                nombre:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: "Envíos y logística"
            examples:
              nueva_categoria:
                value:
                  nombre: "Envíos y logística"
              otra_categoria:
                value:
                  nombre: "Garantías y devoluciones"
      responses:
        '201':
          description: Categoría creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Categoría creada con éxito."
                  categoria:
                    $ref: '#/components/schemas/CategoriaFAQ'
        '400':
          description: Validación fallida
        '401':
          description: No autenticado
 
    get:
      tags: [Categorías FAQ]
      summary: Listar categorías de FAQ
      description: |
        Devuelve todas las categorías del bot del usuario autenticado, ordenadas por fecha de creación descendente.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de categorías
          content:
            application/json:
              example:
                success: true
                categorias:
                  - id: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
                    botId: "c8d1e2f3-4567-89ab-cdef-012345678901"
                    nombre: "Precios y pagos"
                    fechaCreacion: "2026-06-15T10:30:00.000Z"
                  - id: "e2d3c4b5-a6f7-8901-bcde-f01234567890"
                    botId: "c8d1e2f3-4567-89ab-cdef-012345678901"
                    nombre: "Envíos"
                    fechaCreacion: "2026-06-15T10:30:01.000Z"
        '401':
          description: No autenticado
 
  /api/faq-categories/{id}:
    put:
      tags: [Categorías FAQ]
      summary: Actualizar nombre de categoría
      description: |
        Renombra una categoría existente del bot del usuario autenticado.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la categoría a actualizar
          example: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre]
              properties:
                nombre:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: "Medios de pago"
            example:
              nombre: "Medios de pago"
      responses:
        '200':
          description: Categoría actualizada
          content:
            application/json:
              example:
                success: true
                message: "Categoría actualizada con éxito."
                categoria:
                  id: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
                  botId: "c8d1e2f3-4567-89ab-cdef-012345678901"
                  nombre: "Medios de pago"
                  fechaCreacion: "2026-06-15T10:30:00.000Z"
        '400':
          description: ID de categoría inválido
        '401':
          description: No autenticado
        '404':
          description: Categoría no encontrada o no pertenece al bot del usuario
          content:
            application/json:
              example:
                success: false
                error: "La categoría no existe o no pertenece a tu bot."
 
    delete:
      tags: [Categorías FAQ]
      summary: Eliminar categoría
      description: |
        Elimina una categoría del bot del usuario autenticado.
 
        **Importante:** No se puede eliminar una categoría que tenga FAQs asociadas.
        El sistema devolverá `409 Conflict`. Es necesario eliminar o reasignar las FAQs primero.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la categoría a eliminar
          example: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
      responses:
        '200':
          description: Categoría eliminada
          content:
            application/json:
              example:
                success: true
                message: "Categoría eliminada con éxito."
        '401':
          description: No autenticado
        '404':
          description: Categoría no encontrada
        '409':
          description: La categoría tiene FAQs asociadas y no puede eliminarse
          content:
            application/json:
              example:
                success: false
                error: "No se puede eliminar la categoría porque tiene preguntas frecuentes asociadas."
 
  # ==========================================================================
  # FAQs
  # ==========================================================================
  /api/faqs:
    post:
      tags: [FAQs]
      summary: Crear una nueva FAQ
      description: |
        Crea una pregunta frecuente y la asigna a una categoría del bot del usuario.
 
        La categoría debe pertenecer al mismo bot — no se puede usar una categoría de otro usuario.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoriaId, pregunta, respuesta]
              properties:
                categoriaId:
                  type: string
                  format: uuid
                  description: ID de la categoría a la que pertenece esta FAQ (debe ser del mismo bot)
                  example: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
                pregunta:
                  type: string
                  minLength: 5
                  maxLength: 500
                  example: "¿Realizan envíos al interior del país?"
                respuesta:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  example: "Sí, enviamos a todo el país mediante OCA y Andreani. El costo varía según la zona y lo calculamos juntos al momento de la compra."
                activa:
                  type: boolean
                  default: true
                  description: Si es `false`, la FAQ no se mostrará en el chatbot
                  example: true
            examples:
              faq_envios:
                summary: FAQ de envíos
                value:
                  categoriaId: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
                  pregunta: "¿Realizan envíos al interior del país?"
                  respuesta: "Sí, enviamos a todo el país mediante OCA y Andreani. El costo varía según la zona."
                  activa: true
              faq_pagos:
                summary: FAQ de medios de pago
                value:
                  categoriaId: "e2d3c4b5-a6f7-8901-bcde-f01234567890"
                  pregunta: "¿Qué medios de pago aceptan?"
                  respuesta: "Aceptamos transferencia bancaria, Mercado Pago (tarjetas, Mercado Crédito) y efectivo en punto de entrega."
                  activa: true
      responses:
        '201':
          description: FAQ creada
          content:
            application/json:
              example:
                success: true
                message: "Pregunta creada con éxito."
                faq:
                  id: "d4e5f6a7-b8c9-0123-abcd-456789012345"
                  botId: "c8d1e2f3-4567-89ab-cdef-012345678901"
                  categoriaId: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
                  pregunta: "¿Realizan envíos al interior del país?"
                  respuesta: "Sí, enviamos a todo el país mediante OCA y Andreani."
                  activa: true
                  fechaCreacion: "2026-07-02T12:00:00.000Z"
                  fechaModificacion: "2026-07-02T12:00:00.000Z"
        '400':
          description: Validación fallida
        '401':
          description: No autenticado
        '404':
          description: Categoría no encontrada o no pertenece al bot
 
    get:
      tags: [FAQs]
      summary: Listar FAQs con filtros y paginación
      description: |
        Devuelve las FAQs del bot del usuario autenticado.
 
        Soporta filtros combinables: por categoría, por estado (activa/inactiva) y búsqueda de texto.
 
        La paginación es obligatoria (con defaults de page=1 y limit=10).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
          description: Número de página
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          example: 10
          description: Cantidad de FAQs por página (máximo 100)
        - in: query
          name: categoriaId
          schema:
            type: string
            format: uuid
          description: Filtrar por categoría específica
          example: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
        - in: query
          name: activa
          schema:
            type: string
            enum: ["true", "false"]
          description: Filtrar por estado de activación
          example: "true"
        - in: query
          name: buscar
          schema:
            type: string
          description: Texto a buscar en pregunta y respuesta (case-insensitive)
          example: "envío"
      responses:
        '200':
          description: Lista paginada de FAQs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  faqs:
                    $ref: '#/components/schemas/PaginatedFAQs'
              example:
                success: true
                faqs:
                  faqs:
                    - id: "d4e5f6a7-b8c9-0123-abcd-456789012345"
                      botId: "c8d1e2f3-4567-89ab-cdef-012345678901"
                      categoriaId: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
                      pregunta: "¿Realizan envíos al interior del país?"
                      respuesta: "Sí, enviamos a todo el país mediante OCA y Andreani."
                      activa: true
                      fechaCreacion: "2026-07-02T12:00:00.000Z"
                      fechaModificacion: "2026-07-02T12:00:00.000Z"
                      categoria:
                        id: "f1e2d3c4-b5a6-7890-abcd-ef0123456789"
                        nombre: "Envíos"
                  total: 12
                  page: 1
                  limit: 10
                  totalPaginas: 2
        '401':
          description: No autenticado
 
  /api/faqs/{id}:
    put:
      tags: [FAQs]
      summary: Actualizar una FAQ
      description: |
        Actualiza una o más propiedades de una FAQ existente.
 
        Todos los campos del body son opcionales — solo se actualiza lo que se envía.
        Se debe enviar al menos un campo.
 
        Se puede reasignar la FAQ a otra categoría enviando un `categoriaId` diferente
        (la nueva categoría debe pertenecer al mismo bot).
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la FAQ a actualizar
          example: "d4e5f6a7-b8c9-0123-abcd-456789012345"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoriaId:
                  type: string
                  format: uuid
                  description: Nueva categoría (opcional)
                pregunta:
                  type: string
                  minLength: 5
                  maxLength: 500
                respuesta:
                  type: string
                  minLength: 1
                  maxLength: 2000
                activa:
                  type: boolean
            examples:
              actualizar_respuesta:
                summary: Solo actualizar la respuesta
                value:
                  respuesta: "Sí, enviamos a todo el país mediante OCA, Andreani y correo argentino. El costo varía según destino."
              desactivar:
                summary: Desactivar una FAQ sin eliminarla
                value:
                  activa: false
              mover_categoria:
                summary: Mover a otra categoría y actualizar pregunta
                value:
                  categoriaId: "e2d3c4b5-a6f7-8901-bcde-f01234567890"
                  pregunta: "¿Hacen envíos? ¿A qué zonas?"
      responses:
        '200':
          description: FAQ actualizada
          content:
            application/json:
              example:
                success: true
                message: "Pregunta actualizada con éxito."
                faq:
                  id: "d4e5f6a7-b8c9-0123-abcd-456789012345"
                  pregunta: "¿Realizan envíos al interior del país?"
                  respuesta: "Sí, enviamos a todo el país mediante OCA, Andreani y correo argentino."
                  activa: true
        '400':
          description: ID inválido o body vacío
        '401':
          description: No autenticado
        '404':
          description: FAQ no encontrada o categoría de destino inválida
 
    delete:
      tags: [FAQs]
      summary: Eliminar una FAQ
      description: |
        Elimina permanentemente una FAQ del bot del usuario.
 
        Es un **hard delete** (eliminación real). No se puede recuperar.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la FAQ a eliminar
          example: "d4e5f6a7-b8c9-0123-abcd-456789012345"
      responses:
        '200':
          description: FAQ eliminada
          content:
            application/json:
              example:
                success: true
                message: "Pregunta eliminada con éxito."
        '401':
          description: No autenticado
        '404':
          description: FAQ no encontrada o ya eliminada
 
  # ==========================================================================
  # PRODUCTOS
  # ==========================================================================
  /api/products:
    post:
      tags: [Productos]
      summary: Crear un producto
      description: |
        Agrega un producto al catálogo del bot.
 
        Soporta dos modos:
        - **JSON puro:** sin imagen, enviar `urlImagen` como string de URL si se desea.
        - **Con imagen:** usar `multipart/form-data` con el campo `imagen` (JPG/PNG/WEBP, máx 5MB). La imagen se sube automáticamente a Cloudinary.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [nombre, precio]
              properties:
                nombre:
                  type: string
                  minLength: 1
                  maxLength: 200
                  example: "Remera básica manga corta"
                descripcion:
                  type: string
                  maxLength: 2000
                  example: "100% algodón peinado. Disponible en talles S a XL."
                precio:
                  type: number
                  description: Precio en pesos argentinos, máximo 2 decimales. Debe ser mayor a 0.
                  example: 8500.00
                stock:
                  type: integer
                  minimum: 0
                  default: 0
                  example: 50
                urlImagen:
                  type: string
                  format: uri
                  description: URL externa de la imagen (alternativa a subir archivo)
                  example: "https://ejemplo.com/remera.jpg"
                activo:
                  type: boolean
                  default: true
                  example: true
          multipart/form-data:
            schema:
              type: object
              required: [nombre, precio]
              properties:
                nombre:
                  type: string
                  example: "Remera básica manga corta"
                descripcion:
                  type: string
                precio:
                  type: number
                  example: 8500
                stock:
                  type: integer
                  example: 50
                activo:
                  type: boolean
                imagen:
                  type: string
                  format: binary
                  description: Imagen del producto (JPG, PNG, WEBP — máx 5MB)
            examples:
              json_simple:
                summary: Producto sin imagen
                value:
                  nombre: "Pantalón cargo"
                  descripcion: "Pantalón cargo con 6 bolsillos. Talles 28-40."
                  precio: 15000
                  stock: 30
                  activo: true
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              example:
                success: true
                message: "Producto creado con éxito."
                producto:
                  id: "e5f6a7b8-c9d0-1234-abcd-567890123456"
                  botId: "c8d1e2f3-4567-89ab-cdef-012345678901"
                  nombre: "Remera básica manga corta"
                  descripcion: "100% algodón peinado. Disponible en talles S a XL."
                  precio: "8500.00"
                  stock: 50
                  urlImagen: null
                  activo: true
                  fechaCreacion: "2026-07-02T12:00:00.000Z"
                  fechaActualizacion: "2026-07-02T12:00:00.000Z"
        '400':
          description: Validación fallida (precio negativo, stock decimal, etc.)
        '401':
          description: No autenticado
 
    get:
      tags: [Productos]
      summary: Listar productos con filtros y paginación
      description: |
        Devuelve el catálogo de productos del bot del usuario autenticado.
 
        Soporta búsqueda por nombre y filtrado por estado.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          example: 10
        - in: query
          name: buscar
          schema:
            type: string
          description: Buscar por nombre de producto (case-insensitive)
          example: "remera"
        - in: query
          name: activo
          schema:
            type: string
            enum: ["true", "false"]
          description: Filtrar por estado del producto
          example: "true"
      responses:
        '200':
          description: Catálogo paginado de productos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  productos:
                    $ref: '#/components/schemas/PaginatedProductos'
              example:
                success: true
                productos:
                  productos:
                    - id: "e5f6a7b8-c9d0-1234-abcd-567890123456"
                      nombre: "Remera básica manga corta"
                      descripcion: "100% algodón. Talles S a XL."
                      precio: "8500.00"
                      stock: 50
                      urlImagen: null
                      activo: true
                  total: 8
                  page: 1
                  limit: 10
                  totalPaginas: 1
        '401':
          description: No autenticado
 
  /api/products/{id}:
    put:
      tags: [Productos]
      summary: Actualizar un producto
      description: |
        Actualiza uno o más campos de un producto.
 
        Todos los campos son opcionales. Se debe enviar al menos uno.
 
        Si se envía el archivo `imagen` como `multipart/form-data`, se sube a Cloudinary
        y la URL anterior **no se elimina** de Cloudinary (eliminar la imagen previa
        es una mejora pendiente).
 
        Para poner `descripcion` o `urlImagen` en null, enviarlos explícitamente como `null`.
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID del producto a actualizar
          example: "e5f6a7b8-c9d0-1234-abcd-567890123456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  maxLength: 200
                descripcion:
                  type: string
                  maxLength: 2000
                  nullable: true
                precio:
                  type: number
                stock:
                  type: integer
                  minimum: 0
                urlImagen:
                  type: string
                  format: uri
                  nullable: true
                activo:
                  type: boolean
            examples:
              actualizar_stock:
                summary: Actualizar solo el stock
                value:
                  stock: 25
              actualizar_precio:
                summary: Actualizar precio y activar
                value:
                  precio: 9200.00
                  activo: true
              desactivar:
                summary: Desactivar producto sin eliminar
                value:
                  activo: false
      responses:
        '200':
          description: Producto actualizado
          content:
            application/json:
              example:
                success: true
                message: "Producto actualizado con éxito."
                producto:
                  id: "e5f6a7b8-c9d0-1234-abcd-567890123456"
                  nombre: "Remera básica manga corta"
                  precio: "9200.00"
                  stock: 25
                  activo: true
        '400':
          description: Validación fallida o body vacío
        '401':
          description: No autenticado
        '404':
          description: Producto no encontrado
 
    delete:
      tags: [Productos]
      summary: Eliminar un producto
      description: |
        Elimina permanentemente un producto del catálogo. **Hard delete — no se puede recuperar.**
 
        La imagen en Cloudinary no se elimina automáticamente (mejora pendiente).
 
        Registra la acción en `RegistroActividad`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID del producto a eliminar
          example: "e5f6a7b8-c9d0-1234-abcd-567890123456"
      responses:
        '200':
          description: Producto eliminado
          content:
            application/json:
              example:
                success: true
                message: "Producto eliminado con éxito."
        '401':
          description: No autenticado
        '404':
          description: Producto no encontrado o ya eliminado
 
  # ==========================================================================
  # TELEMETRÍA
  # ==========================================================================
  /api/telemetry:
    post:
      tags: [Telemetría]
      summary: Registrar eventos de comportamiento del usuario
      description: |
        Ingesta de eventos de analítica del frontend.
 
        ## Comportamiento clave: fire-and-forget
        **Este endpoint siempre responde `200 OK`**, independientemente de si los eventos
        se encolaron correctamente en Redis. La telemetría nunca bloquea la experiencia del usuario.
 
        ## Autenticación: opcional
        - Si se envía token JWT válido, el `usuarioId` del usuario autenticado se asocia a los eventos.
        - Si no hay token (usuario anónimo), los eventos se registran con `usuarioId: "anonimo"`.
 
        ## Pipeline de datos
        ```
        POST /api/telemetry → Redis (lpush) → Worker (rpop cada 10s) → MotherDuck
        ```
 
        ## Rate limit específico
        60 requests por minuto por IP (más estricto que el límite general de la API).
 
        ## Casos de uso típicos
        - Registrar que un usuario visitó una página (PAGE_VIEW)
        - Registrar un clic en un botón (CLICK)
        - Registrar que el usuario interactuó con el chatbot (BOT_INTERACTION)
        - Registrar un error de JavaScript (ERROR)
        - Registrar el inicio/fin de una sesión (SESSION_START / SESSION_END)
 
        ## sessionId
        Identificador único de sesión del lado del cliente. Debe generarse una vez por
        sesión de navegador y mantenerse en `sessionStorage`. Formato libre (string hasta 200 chars).
        Ejemplo: `crypto.randomUUID()` en el frontend.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, eventos]
              properties:
                sessionId:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: |
                    Identificador único de sesión del cliente. Generarlo con `crypto.randomUUID()`
                    al inicio de la sesión y reutilizarlo en todos los requests de esa sesión.
                  example: "3f7a9c12-4e8b-4d2f-a901-bc45de678901"
                eventos:
                  type: array
                  minItems: 1
                  maxItems: 100
                  description: Uno o más eventos del batch. Máximo 100 por request.
                  items:
                    type: object
                    required: [tipoEvento]
                    properties:
                      tipoEvento:
                        type: string
                        minLength: 1
                        maxLength: 50
                        description: |
                          Tipo de evento. Valores sugeridos (no obligatorios):
                          PAGE_VIEW, CLICK, BOT_INTERACTION, ERROR, FORM_SUBMIT,
                          SESSION_START, SESSION_END, SCROLL, HOVER
                        example: "PAGE_VIEW"
                      pantallaActual:
                        type: string
                        maxLength: 200
                        description: Ruta o nombre de la pantalla actual
                        example: "/dashboard/faqs"
                      elemento:
                        type: string
                        maxLength: 100
                        description: Identificador del elemento con el que se interactuó
                        example: "btn-crear-faq"
                      metadata:
                        type: object
                        additionalProperties: true
                        description: Datos adicionales libres sobre el evento (JSON arbitrario)
                        example:
                          timeOnPage: 4500
                          scrollDepth: 75
            examples:
              usuario_anonimo_una_pagina:
                summary: "Usuario anónimo — vista de página + clic"
                description: "Caso típico de tracking sin login. Dos eventos en un solo request."
                value:
                  sessionId: "3f7a9c12-4e8b-4d2f-a901-bc45de678901"
                  eventos:
                    - tipoEvento: "PAGE_VIEW"
                      pantallaActual: "/landing"
                      metadata:
                        referrer: "https://google.com"
                        userAgent: "Mozilla/5.0"
                    - tipoEvento: "CLICK"
                      pantallaActual: "/landing"
                      elemento: "btn-registrarse"
                      metadata:
                        x: 540
                        y: 312
 
              usuario_autenticado_dashboard:
                summary: "Usuario autenticado — navegación en el dashboard"
                description: "El token JWT es opcional pero si se envía, el usuarioId se registra en MotherDuck."
                value:
                  sessionId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  eventos:
                    - tipoEvento: "PAGE_VIEW"
                      pantallaActual: "/dashboard/faqs"
                      metadata:
                        totalFaqs: 12
                        filtroActivo: "true"
                    - tipoEvento: "CLICK"
                      pantallaActual: "/dashboard/faqs"
                      elemento: "btn-crear-faq"
                      metadata:
                        x: 423
                        y: 156
 
              interaccion_bot:
                summary: "Interacción del cliente final con el chatbot"
                description: "Tracking de conversación en el widget del bot."
                value:
                  sessionId: "bot-sess-xyz789"
                  eventos:
                    - tipoEvento: "BOT_INTERACTION"
                      pantallaActual: "/chatbot-widget"
                      elemento: "chat-input"
                      metadata:
                        mensajeIndex: 1
                        intent: "consulta_precios"
                        respondioBot: true
                    - tipoEvento: "BOT_INTERACTION"
                      pantallaActual: "/chatbot-widget"
                      elemento: "btn-derivar-humano"
                      metadata:
                        mensajeIndex: 4
                        motivoDerivacion: "cliente_no_satisfecho"
 
              error_frontend:
                summary: "Error de JavaScript en el frontend"
                description: "Logging de errores de runtime para debugging."
                value:
                  sessionId: "err-sess-abc123"
                  eventos:
                    - tipoEvento: "ERROR"
                      pantallaActual: "/dashboard/productos"
                      elemento: "componente-carga-imagen"
                      metadata:
                        errorType: "TypeError"
                        errorMessage: "Cannot read properties of null"
                        stack: "TypeError: Cannot read properties of null\n  at ProductoForm.jsx:87"
                        severity: "high"
 
              sesion_completa:
                summary: "Batch completo: inicio y fin de sesión con múltiples interacciones"
                description: "Ejemplo de un batch con múltiples eventos enviados al cerrar la tab o al perder foco."
                value:
                  sessionId: "sess-completa-2026"
                  eventos:
                    - tipoEvento: "SESSION_START"
                      pantallaActual: "/dashboard"
                      metadata:
                        hora: "09:15:30"
                        timezone: "America/Buenos_Aires"
                    - tipoEvento: "PAGE_VIEW"
                      pantallaActual: "/dashboard"
                      metadata:
                        timeOnPage: 3200
                    - tipoEvento: "PAGE_VIEW"
                      pantallaActual: "/dashboard/bot"
                      metadata:
                        timeOnPage: 8900
                    - tipoEvento: "CLICK"
                      pantallaActual: "/dashboard/bot"
                      elemento: "toggle-bot-activo"
                      metadata:
                        nuevoEstado: true
                    - tipoEvento: "SESSION_END"
                      pantallaActual: "/dashboard/bot"
                      metadata:
                        totalTimeMs: 45300
                        paginasVisitadas: 2
      responses:
        '200':
          description: |
            Eventos recibidos y encolados en Redis.
            **Siempre devuelve 200**, incluso si Redis falla (best-effort).
          content:
            application/json:
              example:
                success: true
                message: "Eventos registrados"
        '400':
          description: |
            Validación del body fallida (sessionId vacío, array de eventos vacío, evento sin tipoEvento, etc.)
          content:
            application/json:
              examples:
                sin_session_id:
                  summary: sessionId faltante
                  value:
                    success: false
                    error: "Los datos enviados no son válidos"
                    detalles:
                      - campo: "sessionId"
                        mensaje: "El sessionId es obligatorio"
                array_vacio:
                  summary: Array de eventos vacío
                  value:
                    success: false
                    error: "Los datos enviados no son válidos"
                    detalles:
                      - campo: "eventos"
                        mensaje: "Debes enviar al menos un evento"
                tipo_evento_faltante:
                  summary: Evento sin tipoEvento
                  value:
                    success: false
                    error: "Los datos enviados no son válidos"
                    detalles:
                      - campo: "eventos.0.tipoEvento"
                        mensaje: "El tipo de evento es obligatorio"
        '429':
          description: Rate limit de telemetría excedido (60 req/min por IP)
          content:
            application/json:
              example:
                error: "Demasiados eventos detectados. Bloqueo temporal por seguridad."
 